<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Doomagotchi</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="device">
      <div class="device-inner">

        <div class="top-bar">
          <div id="statusBadge" class="status-badge">OFF</div>
          <div class="title-block">
            <span class="title-label">DOOMAGOTCHI</span>
            <div class="title-sub">control panel</div>
          </div>
          <div style="width:36px"></div>
        </div>

        <!-- pet viewport -->
        <div class="panel" style="display:flex;align-items:center;justify-content:center;min-height:110px;background:#e8e4d4;">
          <img id="petSprite" src="assets/dog_happy.png" alt="pet" style="max-width:90%;max-height:100px;image-rendering:pixelated;" />
        </div>

        <!-- config -->
        <div class="panel">
          <div class="panel-title">Config</div>
          <label class="config-row">
            <input id="trackTabActivity" type="checkbox" />
            <span>Track tab activity</span>
          </label>
          <label class="config-row">
            <input id="trackIdleHeartbeat" type="checkbox" />
            <span>Track idle heartbeat</span>
          </label>
          <label class="config-row">
            <input id="trackReelsScroll" type="checkbox" />
            <span>Track Reels scroll</span>
          </label>
        </div>

        <!-- twilio -->
        <div class="panel" style="margin-top:6px">
          <div class="panel-title">Twilio</div>
          <button id="testTwilioBtn" class="clear-btn" type="button">Test SMS</button>
          <p id="twilioStatus" class="twilio-status">Ready to test.</p>
        </div>

        <!-- events -->
        <div class="panel" style="margin-top:6px">
          <div class="panel-header">
            <div class="panel-title">Recent events</div>
            <button id="clearEventsBtn" class="clear-btn" type="button">clear</button>
          </div>
          <ul id="eventList" class="event-list">
            <li>No events yet.</li>
          </ul>
        </div>

      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
