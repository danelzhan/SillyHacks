<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Scrollagotchi</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <h1>Scrollagotchi</h1>
      <p id="backendStatus">Backend: checking...</p>
      <section class="card">
        <h2>Config</h2>
        <label class="row">
          <input id="sidebarEnabled" type="checkbox" />
          <span>Show health sidebar</span>
        </label>
        <label class="row">
          <input id="trackTabActivity" type="checkbox" />
          <span>Track tab active events</span>
        </label>
        <label class="row">
          <input id="trackIdleHeartbeat" type="checkbox" />
          <span>Track idle heartbeat events</span>
        </label>
        <label class="row">
          <input id="trackReelsScroll" type="checkbox" />
          <span>Track Reels scroll events</span>
        </label>
      </section>
      <h2>Recent events</h2>
      <button id="clearEventsBtn" class="ghost" type="button">Clear logs</button>
      <ul id="eventList"></ul>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
